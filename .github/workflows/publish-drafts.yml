name: Publish Drafts to Blog

on:
  schedule:
    # Every 4 days at 07:00 MSK (04:00 UTC)
    - cron: "0 4 */4 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-drafts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate blog pages data and sitemap
        run: node scripts/publish-drafts.mjs

      - name: Check generated changes
        id: generated_changes
        run: |
          if git diff --quiet -- client/src/generated/blogPosts.ts client/public/sitemap.xml; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit published blog updates
        if: steps.generated_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(blog): auto-publish merged drafts"
          file_pattern: client/src/generated/blogPosts.ts client/public/sitemap.xml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node for build
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm build

      - name: Deploy static files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/public/*"
          target: "/var/www/artrichbot"
          overwrite: true

      - name: Reload nginx on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            nginx -t
            systemctl reload nginx
